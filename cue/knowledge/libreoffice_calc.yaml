pitfalls:
  - situation: trying to use a keyboard shortcut while cell is in edit mode
    avoid: pressing Ctrl+C, Ctrl+Home, etc. while F2/editing is active — they act on cell content
    instead: >
      Press Escape first to exit cell edit mode, then use the shortcut.
      The status bar at the bottom shows "Edit" when in edit mode.

  - situation: clicking a menu item in the menu bar but missing the narrow target
    avoid: rough mouse clicks on menu bar items — misses are common on small targets
    instead: >
      Use Alt + underlined letter to open menus reliably (Alt+D for Data,
      Alt+O for Format, Alt+I for Insert, Alt+T for Tools).

  - situation: sorting data without selecting the correct range first
    avoid: running sort with a partial selection — results in scrambled data
    instead: >
      Click any cell inside the data range (not header), then use
      Data > Sort (Alt+D, S). LibreOffice auto-detects the contiguous range.
      Verify the "Range" field in the Sort dialog before confirming.

  - situation: pasting data that overwrites existing cells unexpectedly
    avoid: pressing Ctrl+V directly when destination might have data
    instead: >
      Use Ctrl+Shift+V (Paste Special) to choose paste options, or
      first insert empty rows/cells before pasting.

  - situation: formula not calculating (shows literal text instead of result)
    avoid: ignoring that the cell is formatted as Text
    instead: >
      Select the cell, open Format > Cells (Ctrl+1), change category to Number
      or General, press OK, then re-enter the formula with = prefix and Enter.

  - situation: navigating to a cell far away by scrolling with mouse/keyboard arrows
    avoid: arrow key navigation across hundreds of rows — very slow
    instead: >
      Use the Name Box (the cell address field left of the formula bar):
      click it (or press Ctrl+G), type the target cell address (e.g., D250),
      and press Enter to jump instantly.

  - situation: accidentally entering data into a merged cell's sub-cells
    avoid: clicking inside a merged cell range then typing — may demerge
    instead: >
      Click on the primary (top-left) cell of the merged range and use F2
      to enter edit mode before typing.

  - situation: LibreOffice shows "Keep Current Format" dialog on save
    avoid: pressing Enter (which might select the wrong option)
    instead: >
      Read the dialog carefully. To keep .xlsx format press "Keep Current Format".
      To save as .ods press "Use ODF Format!". Use Tab to navigate options
      then Space or Enter to confirm.

navigation:
  - target: specific cell by address (e.g. B42, Z100)
    method: "Click Name Box (top-left, shows current address) > type address > Enter"
    notes: Name Box is the fastest way to jump to any cell; Ctrl+G also works on some builds.

  - target: named range or defined name
    method: "Click Name Box dropdown arrow > select named range from list"
    notes: All defined names are listed in the dropdown.

  - target: next/previous sheet tab
    method: "Ctrl+Page Down (next) or Ctrl+Page Up (previous)"
    notes: Faster than clicking the sheet tab strip.

  - target: specific sheet by name
    method: "Right-click any sheet tab > Navigate Sheets, or click sheet tab directly"
    notes: Right-click on left/right arrows in the tab strip for a sheet list.

  - target: last cell with data
    method: "Ctrl+End"
    notes: Moves to the intersection of last used row and column.

  - target: first cell (A1)
    method: "Ctrl+Home"
    notes: Always jumps to A1 regardless of current position.

  - target: end of contiguous data in a direction
    method: "Ctrl+Arrow key (Up/Down/Left/Right)"
    notes: Jumps to last non-empty cell in that direction before a gap.

  - target: Data menu for sort, filter, pivot
    method: "Alt+D"
    notes: Opens Data menu without mouse; then press underlined letter for sub-item.

  - target: Format Cells dialog
    method: "Ctrl+1"
    notes: Direct shortcut to cell formatting; faster than Format > Cells menu.

  - target: Navigator panel (sheets, ranges, objects)
    method: "F5"
    notes: Dockable panel listing all sheets, named ranges, and objects.

common_tasks:
  - name: jump to a specific cell
    steps:
      - "Click the Name Box (shows current cell address, e.g. A1)"
      - "Type target address (e.g. C42)"
      - "Press Enter"

  - name: sort data by a column
    steps:
      - "Click any cell inside the data range"
      - "Press Alt+D to open Data menu"
      - "Press S for Sort"
      - "Choose sort column and order in the dialog"
      - "Press Enter to confirm"

  - name: apply a formula to a range
    steps:
      - "Click the first target cell"
      - "Type the formula starting with ="
      - "Press Ctrl+Enter to confirm without moving"
      - "With cell still selected, copy with Ctrl+C"
      - "Select the rest of the range"
      - "Press Ctrl+V to paste formula"

  - name: format cells as currency
    steps:
      - "Select the cell range"
      - "Press Ctrl+1 to open Format Cells"
      - "Select 'Currency' in the Category list"
      - "Choose desired format"
      - "Press Enter"

  - name: auto-filter a table
    steps:
      - "Click any cell in the header row"
      - "Press Alt+D then F then F (Data > AutoFilter)"
      - "Click the dropdown arrow in the desired column header"
      - "Select or type the filter value"
