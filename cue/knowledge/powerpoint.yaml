pitfalls:
  - situation: clicking on a shape single-click enters object selection mode, not text edit
    avoid: typing immediately after a single click expecting text to appear
    instead: >
      Single click selects the object (shows handles). Press Enter or F2 or
      double-click to enter text edit mode. Escape exits text edit back to
      object selection; Escape again deselects all objects on the slide.

  - situation: Ctrl+D duplicates a slide when Slide panel is focused but duplicates an object when canvas is focused
    avoid: pressing Ctrl+D without knowing what is focused
    instead: >
      Click in the main slide canvas area first to ensure slide objects are in scope.
      If you intended to duplicate the slide (not an object), right-click the slide
      thumbnail in the panel and choose Duplicate Slide.

  - situation: animations playing in wrong order
    avoid: adding animations without checking the Animation Pane sequence
    instead: >
      Open Animation Pane (Animations tab > Animation Pane) to see the full order.
      Drag items in the pane to reorder, or use the reorder buttons.

  - situation: images inserted with wrong wrapping or positioning
    avoid: inserting images and having them placed over existing content with no control
    instead: >
      After inserting, use the Position and Size dialog (F4) for precise placement.
      Use Arrange > Align to align objects to the slide center or edges.

  - situation: font not embedded causing display issues when sharing the file
    avoid: using custom fonts without embedding them in the file
    instead: >
      Go to File > Options > Save and check "Embed fonts in the file".
      This increases file size but ensures correct display on other computers.

  - situation: presenter view showing on wrong screen during presentation
    avoid: starting slideshow without configuring display settings first
    instead: >
      Go to Slideshow tab > Set Up Slide Show to configure which monitor shows
      the presentation vs. Presenter View. Use Display Settings to swap if needed.

navigation:
  - target: specific slide by number
    method: "Click slide thumbnail in the Slides panel on the left"
    notes: During slideshow, type the slide number then press Enter to jump to it.

  - target: Slide Sorter view
    method: "View > Slide Sorter or Ctrl+Shift+Tab (some versions)"
    notes: Shows all slides as thumbnails; drag to reorder, double-click to edit.

  - target: Outline view (all slide text)
    method: "View > Outline View"
    notes: Edit all text content across slides in outline format.

  - target: slide layout options
    method: "Home tab > Layout dropdown"
    notes: Apply pre-set layouts (Title Slide, Title and Content, Blank, etc.).

  - target: Animation Pane
    method: "Animations tab > Animation Pane button"
    notes: Shows all animations on current slide in sequence order.

  - target: Slide Master
    method: "View > Slide Master"
    notes: Edit template styles affecting all slides; Close Master View to exit.

  - target: object on slide (keyboard cycle)
    method: "Press Tab to cycle through objects on the current slide"
    notes: Shift+Tab cycles in reverse; Enter/F2 enters edit mode for the object.

common_tasks:
  - name: add a new slide with a specific layout
    steps:
      - "In the Slides panel, click after the slide where you want to insert"
      - "Press Ctrl+M to insert a new slide with default layout"
      - "Go to Home tab > Layout to change the layout"
      - "Or right-click in the Slides panel and choose New Slide or Duplicate Slide"

  - name: insert and position an image
    steps:
      - "Go to Insert tab > Pictures > This Device"
      - "Browse to the image and click Insert"
      - "Drag the image to position it"
      - "Drag corner handles to resize (hold Shift to maintain aspect ratio)"
      - "Use F4 for precise position and size values"

  - name: add an animation to an object
    steps:
      - "Select the object on the slide"
      - "Go to Animations tab"
      - "Click an animation in the gallery (or More for full list)"
      - "Set Start, Duration, and Delay in the Timing group"
      - "Click Preview to test the animation"

  - name: run the presentation
    steps:
      - "Press F5 to start from the beginning"
      - "Click or press Space/Enter/Right arrow to advance"
      - "Press Left arrow or Backspace to go back"
      - "Press Escape to exit"

  - name: export as PDF
    steps:
      - "Press Alt+F to open File menu"
      - "Choose Export > Create PDF/XPS"
      - "Set filename and location"
      - "Choose 'Standard' quality for print or 'Minimum size' for web"
      - "Click Publish"
