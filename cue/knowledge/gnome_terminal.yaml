    keys: "Ctrl+Page Down"
    reliability: 1.0
  - action: switch to previous tab
    keys: "Ctrl+Page Up"
    reliability: 1.0
  - action: switch to tab by number
    keys: "Alt+1 through Alt+9"
    reliability: 0.9
  - action: copy selected text
    keys: "Ctrl+Shift+C"
    reliability: 1.0
